name: InTraffic
options:
  bundleIdPrefix: com.intrafficapp
  deploymentTarget:
    iOS: "18.0"
  defaultConfig: Debug
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  InTraffic:
    type: application
    platform: iOS
    sources:
      - path: InTraffic
        excludes:
          - "**/.DS_Store"
          - Resources/IMDF
      - path: InTraffic/Resources/IMDF
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intrafficapp.InTraffic
        INFOPLIST_FILE: InTraffic/Resources/Info.plist
        DEVELOPMENT_TEAM: 4QG3GC35LA
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: InTraffic/Resources/Info.plist
      properties:
        CFBundleDisplayName: InTraffic
        CFBundleName: InTraffic
        UILaunchScreen:
          UIColorName: ""
        NSLocationAlwaysAndWhenInUseUsageDescription: "실내 혼잡도를 정확하게 측정하기 위해 위치 정보를 사용합니다. 이름·연락처 등 개인정보는 수집하지 않습니다."
        NSLocationWhenInUseUsageDescription: "실내 혼잡도 측정을 위해 위치 정보를 사용합니다."
        NSLocationAlwaysUsageDescription: "백그라운드에서도 혼잡도를 측정하기 위해 위치 정보를 사용합니다."
        UIBackgroundModes:
          - location
        UIRequiredDeviceCapabilities:
          - armv7

configs:
  Debug: debug
  Release: release
